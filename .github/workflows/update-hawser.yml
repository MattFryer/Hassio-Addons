name: Update Hawser

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Hawser release
        id: upstream
        run: |
          LATEST=$(curl -fsSL "https://api.github.com/repos/Finsys/hawser/releases/latest" \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest upstream version: ${LATEST}"

      - name: Get current pinned version
        id: current
        run: |
          CURRENT=$(grep -oP '(?<=ghcr\.io/finsys/hawser:)\S+' Hawser/Dockerfile)
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Current pinned version: ${CURRENT}"

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "Already up to date."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update available: ${{ steps.current.outputs.version }} → ${{ steps.upstream.outputs.version }}"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Dockerfile and config.json
        if: steps.check.outputs.needed == 'true'
        run: |
          NEW="${{ steps.upstream.outputs.version }}"

          # Update Dockerfile
          sed -i "s|ghcr.io/finsys/hawser:.*|ghcr.io/finsys/hawser:${NEW}|" Hawser/Dockerfile

          # Update version in config.json, appending -0 to allow add-on patches
          # without version mismatch (e.g. 0.2.24-0, 0.2.24-1, ...)
          sed -i "s/\"version\": \".*\"/\"version\": \"${NEW}-0\"/" Hawser/config.json

      - name: Open pull request
        if: steps.check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/hawser-${{ steps.upstream.outputs.version }}
          commit-message: "chore: update Hawser to v${{ steps.upstream.outputs.version }}"
          title: "Update Hawser to v${{ steps.upstream.outputs.version }}"
          body: |
            Automated update of the Hawser add-on.

            - **Previous version:** `${{ steps.current.outputs.version }}`
            - **New version:** `${{ steps.upstream.outputs.version }}`

            ### Upstream release notes
            https://github.com/Finsys/hawser/releases/tag/v${{ steps.upstream.outputs.version }}

            Please review the release notes before merging.
          labels: dependencies
